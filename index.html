<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickleStack Live</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#0f172a;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  background:#22c55e;
  color:white;
  border:none;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

.player{
  padding:10px;
  background:#334155;
  margin-top:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🏓 PickleStack Live</h1>

<div class="card">
<h2>Add Player</h2>

<input id="playerName" placeholder="Player Name">

<button onclick="addPlayer()">Join Queue</button>
</div>

<div class="card">
<h2>Waiting Queue</h2>

<div id="queue"></div>
</div>

<script>

let players=[];

function addPlayer(){

const name=document.getElementById("playerName").value.trim();

if(!name) return;

players.push(name);

document.getElementById("playerName").value="";

render();
}

function render(){

document.getElementById("queue").innerHTML=
players.map((p,i)=>
`<div class="player">${i+1}. ${p}</div>`
).join("");

}

</script>

</body>
</html>
